services:
  - type: web
    name: inkflow-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_DIR
        value: /var/data
      - key: FRONTEND_ORIGIN
        sync: false
    disk:
      name: inkflow-data
      mountPath: /var/data
      sizeGB: 1
